name: build19

on:
  push:
    paths:
      - 'app19/**'
      - '.github/workflows/build19.yml'
  workflow_dispatch:

jobs:
  build19:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure + Build (CMake + NDK, arm64-v8a)
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          echo "Using NDK at: $NDK"
          test -n "$NDK" && test -d "$NDK"
          cmake -S app19 -B build19 \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build19 -j
          file build19/vpp_probe || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpp_probe-arm64-v8a
          path: build19/vpp_probe
          if-no-files-found: error
