name: Static analysis

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            file \
            zip \
            unzip \
            python3 \
            python3-pip \
            jq \
            curl \
            default-jre-headless

      - name: Run basic static analysis
        run: |
          chmod +x scripts/basic_static.sh
          ./scripts/basic_static.sh

      - name: Download Ghidra
        env:
          GHIDRA_VERSION: 11.3.2
        run: |
          set -eux
          GHIDRA_ZIP="ghidra_${GHIDRA_VERSION}_PUBLIC_20250415.zip"
          GHIDRA_URL="https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/${GHIDRA_ZIP}"
          curl -L -o /tmp/ghidra.zip "$GHIDRA_URL"
          unzip -q /tmp/ghidra.zip -d /opt
          echo "GHIDRA_INSTALL_DIR=/opt/ghidra_${GHIDRA_VERSION}_PUBLIC" >> "$GITHUB_ENV"

      - name: Run headless Ghidra analysis
        run: |
          chmod +x scripts/ghidra_full_analysis.sh
          ./scripts/ghidra_full_analysis.sh

      - name: Show generated files
        if: always()
        run: |
          echo "Repository files:"
          find . -maxdepth 3 -type f | sort
          echo ""
          echo "analysis_out:"
          find analysis_out -type f | sort || true
          echo ""
          echo "ghidra_out:"
          find ghidra_out -type f | sort || true

      - name: Build analysis archive
        if: always()
        run: |
          rm -f lybfghook-analysis.zip
          zip -qr lybfghook-analysis.zip \
            analysis_out \
            ghidra_out \
            ghidra_project \
            notes \
            scripts \
            ghidra_scripts \
            README.md \
            .github \
            || true
          ls -lh lybfghook-analysis.zip || true

      - name: Upload analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lybfghook-analysis
          path: lybfghook-analysis.zip
          if-no-files-found: error
          retention-days: 30
