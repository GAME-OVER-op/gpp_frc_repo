name: build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure + Build (CMake + NDK toolchain, arm64-v8a)
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          echo "Using NDK at: $NDK"
          test -n "$NDK" && test -d "$NDK"
          cmake -S app -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          file build/gpp_frc_test || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpp_frc_test-arm64-v8a
          path: build/gpp_frc_test
          if-no-files-found: error
